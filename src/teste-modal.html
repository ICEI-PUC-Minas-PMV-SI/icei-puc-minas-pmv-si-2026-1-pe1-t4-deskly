<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/global/global.css">
    <title>Modal</title>
</head>
<body>
    <button class="open-modal" data-modal="modal-1">
        Open Modal
    </button>

    <dialog id="modal-1">
        <form action="">
            <div class="modal-header">
            <h3 class="modal-title">Nova reserva</h3>
            <button class="close-modal" data-modal="modal-1" type="button">
                <img src="assets/icons/close-menu.svg" alt="Fechar">
            </button>
            </div>

            <div class="modal-body">

            <div class="input-group">
                <label for="espaco">Espaço</label>
                <select id="espaco" name="espaco" onchange="atualizarConvidados()">
                <option value="">Selecione um espaço</option>
                <option value="4">Sala A — cap. 4 pessoas</option>
                <option value="8">Sala B — cap. 8 pessoas</option>
                <option value="12">Sala C — cap. 12 pessoas</option>
                </select>
            </div>

            <div class="input-group">
                <label for="date">Data</label>
                <input type="date" id="date">
            </div>

            <div class="input-group">
                <label for="start-time">Horário de início</label>
                <input type="time" id="start-time">
            </div>

            <div class="input-group">
                <label for="ending-time">Horário de término</label>
                <input type="time" id="ending-time">
            </div>

            <div class="input-group" id="convidados-wrapper" style="display: none;">
                <label for="convidados">
                Convidados <span id="limite-label"></span>
                </label>
                <select id="convidados" name="guests[]" multiple></select>
                <small id="aviso"></small>
            </div>

            </div>

            <div class="modal-footer">
            <button type="button" class="close-modal" data-modal="modal-1">Cancelar</button>
            <button type="button" onclick="confirmar()">Confirmar</button>
            </div>
        </form>
        </dialog>


    <script src="./assets/js/modal.js"></script>
</body>
</html>
